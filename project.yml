name: ServerWatcher
options:
  bundleIdPrefix: com.serverwatcher
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true

schemes:
  ServerWatcher:
    build:
      targets:
        ServerWatcher: all
        ServerWatcherWidgetExtension: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "26.0622.15"
    CURRENT_PROJECT_VERSION: "26.0622.15"

targets:
  ServerWatcher:
    type: application
    platform: iOS
    sources:
      - path: ServerWatcher
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.serverwatcher.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Server Watcher"
        CODE_SIGN_ENTITLEMENTS: ServerWatcher/ServerWatcher.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: ServerWatcher/ServerWatcher.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.serverwatcher.shared
    dependencies:
      - target: ServerWatcherWidgetExtension
        embed: true
        codeSign: true

  ServerWatcherWidgetExtension:
    type: app-extension
    platform: iOS
    product: ServerWatcherWidgetExtension
    sources:
      - path: ServerWatcherWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.serverwatcher.app.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ServerWatcherWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Server Watcher Widget"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: ServerWatcherWidget/ServerWatcherWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: ServerWatcherWidget/ServerWatcherWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.serverwatcher.shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
